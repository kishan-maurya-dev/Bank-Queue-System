<!DOCTYPE html>
<html>
<head>
<title>🏦 Bank Queue System</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background-image: url('bank.jpg'); 
    background-size: cover;           
    background-position: center;      
    background-repeat: no-repeat;     
    background-color: rgba(0,0,0,0.5); 
    background-blend-mode: darken;    
    color: white;
}
.container {
    background-color: rgba(0,0,0,0.6); 
    padding: 30px;
    border-radius: 15px;
    width: 850px;
    margin: auto;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

.header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
}

.logo { font-size: 45px; }
h1 { color: #00e6e6; }

input {
    padding: 10px;
    margin: 10px;
    width: 300px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 15px;
    margin: 10px;
    background: #00e6e6;
    border: none;
    color: black;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

button:hover {
    background: #00b3b3;
    color: white;
}

.queue-box {
    display: inline-block;
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, #00ffcc, #00b3b3);
    color: black;
    margin: 8px;
    line-height: 70px;
    font-weight: bold;
    border-radius: 10px;
    font-size: 18px;
    transition: transform 0.5s ease, opacity 0.5s ease;
}

.queue-box.front { border: 4px solid yellow; }
.queue-box.rear { border: 4px solid red; }

.queue-box.pop {
    transform: scale(1.5);
    opacity: 0;
}

.status { margin-top: 20px; font-size: 18px; color: #00ffcc; }
.counter { margin-top: 10px; font-size: 16px; color: orange; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo">🏦</div>
<h1>Bank Queue System</h1>
</div>

<h3>Create Queue</h3>
<input type="number" id="size" placeholder="Enter Queue Capacity">
<button onclick="createQueue()">Create Queue</button>

<hr>

<h3>Add Customer IDs (Space Separated)</h3>
<input type="text" id="values" placeholder="Example: 201 202 203">
<button onclick="addMultiple()">Add Customers</button>
<button onclick="dequeue()">Serve Customer</button>
<button id="toggleBtn" onclick="toggleWindow()">🏦 Close Window</button>

<h3>Queue Visualization</h3>
<div id="queueDisplay"></div>

<div class="counter" id="counter">Total Customers: 0</div>
<div class="status" id="status"></div>

</div>

<script>
let isClosed = false;

                                                                   // CREATE QUEUE
async function createQueue() {
    if(isClosed) return;
    let size = document.getElementById("size").value;
    if(size.trim()==="" || size<=0) return;
    await fetch(`http://localhost:8000/create?size=${size}`);
    document.getElementById("status").innerText = "✅ Queue Created!";
    document.getElementById("queueDisplay").innerHTML = "";
    document.getElementById("counter").innerText = "Total Customers: 0";
}

                                                                // ADD MULTIPLE
async function addMultiple() {
    if(isClosed) return;
    let input = document.getElementById("values").value;
    if(input.trim()==="") return;
    let numbers = input.trim().split(/\s+/);
    let added = 0, full = false;

    for(let num of numbers) {
        let res = await fetch(`http://localhost:8000/enqueue?value=${num}`);
        let data = await res.text();
        let parts = data.split("|");

        if(parts[0]==="CLOSED") { showClosed(); return; }
        let queueData = parts[1]; displayQueue(queueData);

        if(parts[0]==="FULL") { full = true; break; }
        else added++;
    }

    document.getElementById("status").innerText = full ? 
        `⚠ Queue FULL! Only ${added} added.` : `✅ ${added} Customers Added!`;
    document.getElementById("values").value = "";
}

                                                                       // DEQUEUE
async function dequeue() {
    if(isClosed) return;
    let res = await fetch("http://localhost:8000/dequeue");
    let data = await res.text();
    let parts = data.split("|");

    if(parts[0]==="CLOSED") { showClosed(); return; }

    let queueData = parts[1];
    displayQueue(queueData);

    if(parts[0]==="EMPTY") {
        document.getElementById("status").innerText = "⚠ Queue is EMPTY!";
    } else {
                                                                 // Animate front box
        let frontBox = document.querySelector(".queue-box.front");
        if(frontBox){
            frontBox.classList.add("pop");
            setTimeout(() => displayQueue(queueData), 500);
        }
        document.getElementById("status").innerText = "🏦 Customer Served!";
    }
}

                                                                   // TOGGLE WINDOW
async function toggleWindow() {
    let res = await fetch("http://localhost:8000/toggle");
    let data = await res.text();
    let btn = document.getElementById("toggleBtn");

    if(data.startsWith("CLOSED")) {
        isClosed = true;
        document.getElementById("status").innerText = "🏦 Bank Window Closed!";
        disableQueueButtons();
        btn.innerText = "🏦 Open Window";
    } else {
        isClosed = false;
        document.getElementById("status").innerText = "✅ Bank Window Opened!";
        enableQueueButtons();
        btn.innerText = "🏦 Close Window";
    }
}

function disableQueueButtons(){
    document.querySelectorAll("button").forEach(btn=>{
        if(btn.id!=="toggleBtn"){ btn.disabled=true; btn.style.background="gray"; btn.style.color="white"; }
    });
}
function enableQueueButtons(){
    document.querySelectorAll("button").forEach(btn=>{
        if(btn.id!=="toggleBtn"){ btn.disabled=false; btn.style.background="#00e6e6"; btn.style.color="black"; }
    });
}

                                                                 // DISPLAY QUEUE
function displayQueue(queueData){
    let container = document.getElementById("queueDisplay");
    container.innerHTML = "";
    if(!queueData || queueData.trim()===""){ 
        document.getElementById("counter").innerText="Total Customers: 0";
        return; 
    }

    let values = queueData.split(",");
    document.getElementById("counter").innerText="Total Customers: "+values.length;

    values.forEach((val,index)=>{
        let box = document.createElement("div");
        box.className="queue-box";
        box.innerText=val;
        if(index===0) box.classList.add("front");
        if(index===values.length-1) box.classList.add("rear");
        container.appendChild(box);
    });
}
</script>
</body>
</html>
